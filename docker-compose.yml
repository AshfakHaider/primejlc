services:
  postgres:
    image: postgres:16-alpine
    container_name: prime-japanese-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prime
      POSTGRES_PASSWORD: prime
      POSTGRES_DB: prime_japanese_crm
    ports:
      - "5432:5432"
    volumes:
      - prime_japanese_crm_data:/var/lib/postgresql/data

volumes:
  prime_japanese_crm_data:
